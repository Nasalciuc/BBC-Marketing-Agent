<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 628px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', sans-serif;
    position: relative;
  }

  .background {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('{{BG}}');
    background-size: cover;
    background-position: center;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      105deg,
      rgba(11, 24, 41, 0.97) 0%,
      rgba(11, 24, 41, 0.93) 25%,
      rgba(11, 24, 41, 0.70) 50%,
      rgba(11, 24, 41, 0.25) 75%,
      rgba(11, 24, 41, 0.05) 100%
    );
  }

  .bottom-fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 150px;
    background: linear-gradient(
      to top,
      rgba(10, 22, 40, 0.95) 0%,
      rgba(10, 22, 40, 0.4) 50%,
      transparent 100%
    );
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 40px 48px 40px 56px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .content::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 50%;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: -1;
  }

  .top {
    padding: 0;
    margin: 0;
  }

  .logo {
    margin: 0;
    padding: 0;
  }

  .logo img {
    height: 44px;
    width: auto;
    display: block;
    margin: 0;
    padding: 0;
    opacity: 0.90;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 560px;
    padding: 0;
    margin: 0;
  }

  .event-tag {
    background: none;
    color: #C4A44A;
    padding: 0;
    border-radius: 0;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    margin-bottom: 20px;
  }

  .headline {
    font-size: 44px;
    font-weight: 800;
    color: #FFFFFF;
    line-height: 1.1;
    text-shadow:
      0 1px 2px rgba(0, 0, 0, 0.8),
      0 4px 16px rgba(0, 0, 0, 0.4),
      0 8px 32px rgba(0, 0, 0, 0.2);
    margin-bottom: 10px;
    letter-spacing: -0.5px;
  }

  .price-label {
    font-size: 15px;
    font-weight: 300;
    color: #C9A54E;
    opacity: 0.85;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    text-transform: capitalize;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .price {
    font-size: 64px;
    font-weight: 900;
    color: #C9A54E;
    line-height: 1;
    text-shadow:
      0 2px 4px rgba(0, 0, 0, 0.5),
      0 4px 20px rgba(0, 0, 0, 0.3);
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  .urgency {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
  }

  .hook {
    font-size: 14px;
    font-weight: 300;
    font-style: italic;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.4;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
    margin-bottom: 24px;
    max-width: 420px;
  }

  .cta {
    font-size: 14px;
    font-weight: 500;
    color: #C9A54E;
    opacity: 0.9;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
    transition: all 0.2s;
    background: rgba(196, 164, 74, 0.08);
    border: 1.5px solid rgba(196, 164, 74, 0.35);
    padding: 10px 18px;
    display: inline-block;
    border-radius: 4px;
  }

  .footer-url {
    margin-top: 12px;
    font-size: 14px;
    font-weight: 500;
    color: #C9A54E;
    opacity: 0.9;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
  }

  .accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(
      90deg,
      #C4A44A 0%,
      rgba(196, 164, 74, 0.3) 40%,
      transparent 70%
    );
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="background"></div>
  <div class="overlay"></div>
  <div class="bottom-fade"></div>

  <div class="content">
    <div class="top">
      <div class="logo">{{LOGO_HTML}}</div>
    </div>

    <div class="main">
      <div class="event-tag">{{BADGE}}</div>
      <div class="headline">{{ROUTE}}</div>
      <div class="price-label">Business Class {{TRIP_TYPE}} From</div>
      <div class="price">{{PRICE}}</div>
      <div class="urgency">{{URGENCY}}</div>
      <div class="hook">{{HOOK}}</div>
      <div class="cta">{{CTA}}</div>
      <div class="footer-url">{{CTA_URL}}</div>
    </div>
  </div>

  <div class="accent"></div>
</body>
</html>
