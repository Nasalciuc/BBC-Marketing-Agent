name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python scripts/ensure_default_background.py
      - run: pytest tests/test_pricing.py tests/test_branding.py tests/test_discovery.py -v
      - run: ruff check config.py services/ tests/
